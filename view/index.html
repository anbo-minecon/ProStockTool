<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Stock Tool</title>
    <link rel="stylesheet" href="../styles/header-footer.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="../styles/bodega-selector.css">
</head>
<body>

<main>

    <!-- ══ BIENVENIDO ══ -->
    <div class="welcome-top">
        <p class="welcome-eyebrow">Sistema de Inventario &nbsp;·&nbsp; Ferretería</p>
        <h1 class="welcome-heading">¡Bienvenido a <span>Pro Stock Tool</span>!</h1>
        <p class="welcome-desc">Gestiona tu inventario con precisión. Todo en un solo lugar.</p>
    </div>

    <!-- ══ TRANSPORTADORA ══ -->
    <div class="scene">
      <svg viewBox="0 0 860 230" xmlns="http://www.w3.org/2000/svg">

        <!-- ── PATAS / ESTRUCTURA ── -->
        <!-- Pata izquierda -->
        <line x1="118" y1="152" x2="96"  y2="210" stroke="#b0bec5" stroke-width="7" stroke-linecap="round"/>
        <line x1="140" y1="152" x2="160" y2="210" stroke="#b0bec5" stroke-width="7" stroke-linecap="round"/>
        <!-- Pata central -->
        <line x1="412" y1="152" x2="394" y2="210" stroke="#b0bec5" stroke-width="7" stroke-linecap="round"/>
        <line x1="432" y1="152" x2="450" y2="210" stroke="#b0bec5" stroke-width="7" stroke-linecap="round"/>
        <!-- Pata derecha -->
        <line x1="718" y1="152" x2="698" y2="210" stroke="#b0bec5" stroke-width="7" stroke-linecap="round"/>
        <line x1="740" y1="152" x2="760" y2="210" stroke="#b0bec5" stroke-width="7" stroke-linecap="round"/>
        <!-- Base horizontal -->
        <rect x="88" y="207" width="688" height="11" rx="5" fill="#b0bec5"/>

        <!-- ── SOPORTE LATERAL ── -->
        <!-- izquierdo -->
        <rect x="100" y="136" width="18" height="22" rx="3" fill="#78909c"/>
        <!-- derecho -->
        <rect x="742" y="136" width="18" height="22" rx="3" fill="#78909c"/>

        <!-- ── CINTA ── -->
        <!-- Sombra bajo la cinta -->
        <rect x="102" y="148" width="656" height="12" rx="3" fill="rgba(0,0,0,0.06)"/>
        <!-- Cuerpo principal de la cinta -->
        <rect x="102" y="136" width="656" height="20" rx="4" fill="#cfd8e3"/>
        <!-- Rayas animadas que se deslizan -->
        <line x1="102" y1="146" x2="758" y2="146"
              stroke="#b8c8d8" stroke-width="20"
              stroke-dasharray="14 14"
              class="belt-stripe"/>
        <!-- Borde superior -->
        <rect x="102" y="133" width="656" height="5" rx="2.5" fill="#8fa8be"/>
        <!-- Borde inferior -->
        <rect x="102" y="151" width="656" height="5" rx="2.5" fill="#8fa8be"/>

        <!-- ── RODILLO IZQUIERDO ── -->
        <circle cx="114" cy="146" r="17" fill="#78909c" stroke="#546e7a" stroke-width="3"/>
        <circle cx="114" cy="146" r="7"  fill="#455a64"/>
        <!-- marcas que giran -->
        <line x1="114" y1="129" x2="114" y2="163" stroke="#607d8b" stroke-width="2.5"
              class="roller-mark" style="transform-origin:114px 146px"/>
        <line x1="97"  y1="146" x2="131" y2="146" stroke="#607d8b" stroke-width="2.5"
              class="roller-mark" style="transform-origin:114px 146px"/>

        <!-- ── RODILLO DERECHO ── -->
        <circle cx="746" cy="146" r="17" fill="#78909c" stroke="#546e7a" stroke-width="3"/>
        <circle cx="746" cy="146" r="7"  fill="#455a64"/>
        <line x1="746" y1="129" x2="746" y2="163" stroke="#607d8b" stroke-width="2.5"
              class="roller-mark-r" style="transform-origin:746px 146px"/>
        <line x1="729" y1="146" x2="763" y2="146" stroke="#607d8b" stroke-width="2.5"
              class="roller-mark-r" style="transform-origin:746px 146px"/>

        <!-- ── RODILLO CENTRAL (decorativo) ── -->
        <circle cx="430" cy="157" r="10" fill="#90a4ae" stroke="#78909c" stroke-width="2"/>
        <circle cx="430" cy="157" r="4"  fill="#607d8b"/>

        <!-- ── CAJA FANTASMA 2 ── -->
        <g class="box-ghost-2" style="transform-origin:430px 114px">
          <rect x="398" y="88" width="64" height="50" rx="4" fill="#4a90e2"/>
          <rect x="398" y="75" width="64" height="16" rx="3" fill="#357abd"/>
        </g>

        <!-- ── CAJA FANTASMA 1 ── -->
        <g class="box-ghost-1" style="transform-origin:430px 114px">
          <rect x="398" y="88" width="64" height="50" rx="4" fill="#4a90e2"/>
          <rect x="398" y="75" width="64" height="16" rx="3" fill="#357abd"/>
        </g>

        <!-- ══════════════════════════════
             CAJA PRINCIPAL (protagonista)
        ══════════════════════════════ -->
        <g class="box-main" style="transform-origin:430px 114px">

          <!-- Sombra -->
          <ellipse cx="430" cy="140" rx="38" ry="5" fill="rgba(0,0,0,0.13)"/>

          <!-- Cuerpo de la caja -->
          <rect x="396" y="90" width="68" height="48" rx="5"
                fill="white" stroke="#4a90e2" stroke-width="2.5"/>

          <!-- Franja azul central -->
          <rect x="396" y="108" width="68" height="9" fill="#e8f1fc"/>

          <!-- Línea divisoria vertical punteada -->
          <line x1="430" y1="90" x2="430" y2="138"
                stroke="#4a90e2" stroke-width="1.5" stroke-dasharray="3 2.5"/>

          <!-- Texto PST en la caja -->
          <text x="430" y="130" text-anchor="middle"
                font-family="'DM Sans', sans-serif"
                font-size="7.5" fill="#4a90e2" font-weight="600" letter-spacing="1">
            PST
          </text>

          <!-- ── TAPA ── -->
          <!-- El grupo rota desde la esquina superior izquierda de la tapa: 396, 90 -->
          <g class="box-lid" style="transform-origin:396px 90px">
            <!-- Panel de la tapa -->
            <rect x="396" y="71" width="68" height="21" rx="5"
                  fill="#4a90e2" stroke="#357abd" stroke-width="2"/>
            <!-- Detalle línea en la tapa -->
            <rect x="414" y="76" width="32" height="3" rx="1.5"
                  fill="white" opacity="0.45"/>
            <!-- Pequeña lengüeta / cierre -->
            <rect x="422" y="90" width="16" height="7" rx="2.5"
                  fill="#357abd"/>
          </g>

          <!-- ── BRILLO / ESTRELLAS al abrir ── -->
          <g class="shine" style="transform-origin:430px 80px">
            <!-- Halo -->
            <circle cx="430" cy="62" r="11" fill="#fff9c4" opacity="0.88"/>
            <!-- Rayos cardinales -->
            <line x1="430" y1="47" x2="430" y2="42" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
            <line x1="430" y1="77" x2="430" y2="82" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
            <line x1="415" y1="62" x2="410" y2="62" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
            <line x1="445" y1="62" x2="450" y2="62" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
            <!-- Rayos diagonales -->
            <line x1="419" y1="51" x2="415" y2="47" stroke="#ffc107" stroke-width="2" stroke-linecap="round"/>
            <line x1="441" y1="51" x2="445" y2="47" stroke="#ffc107" stroke-width="2" stroke-linecap="round"/>
            <line x1="419" y1="73" x2="415" y2="77" stroke="#ffc107" stroke-width="2" stroke-linecap="round"/>
            <line x1="441" y1="73" x2="445" y2="77" stroke="#ffc107" stroke-width="2" stroke-linecap="round"/>
            <!-- Estrella de 5 puntas -->
            <polygon
              points="430,50 431.8,55.5 437.5,55.5 433,59 434.8,64.5 430,61 425.2,64.5 427,59 422.5,55.5 428.2,55.5"
              fill="#ffc107"/>
          </g>

        </g><!-- /box-main -->

        <!-- ── ETIQUETAS DE DIRECCIÓN (flechas decorativas) ── -->
        <!-- izquierda -->
        <polygon points="58,146 76,136 76,156" fill="#4a90e2" opacity="0.2"/>
        <!-- derecha -->
        <polygon points="802,146 784,136 784,156" fill="#4a90e2" opacity="0.2"/>

      </svg>
    </div>

    <!-- ══ STATUS PILLS ══ -->
    <div class="pills-row">
        <div class="pill">
            <span class="pill-dot"></span>
            Inventario activo
        </div>
        <div class="pill">
            <span class="pill-dot"></span>
            Bodegas sincronizadas
        </div>
        <div class="pill">
            <span class="pill-dot"></span>
            Sistema en línea
        </div>
    </div>

</main>

<script src="../controllers/header-footer.js"></script>
</body>
</html>
