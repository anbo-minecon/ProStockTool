<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Inventario - Pro Stock Tool</title>
  <link rel="stylesheet" href="../styles/header-footer.css">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/tendero.css">
</head>
<body>
<main>
<div class="page-wrapper">

  <!-- CABECERA -->
  <div class="mod-header">
    <div class="mod-header-left">
      <h2 class="mod-title">Consulta de Inventario</h2>
      <p class="mod-subtitle">Busca productos, verifica stock y precios en tiempo real</p>
    </div>
    <div class="mod-header-right">
      <div class="search-wrap">
        <svg class="s-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="busquedaGlobal" class="search-input" style="width:320px" placeholder="Buscar producto, SKU, categoría...">
      </div>
    </div>
  </div>

  <!-- STATS rápidas -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <div class="stat-icon blue">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
      </div>
      <div><p class="stat-info-label">Total Productos</p><p class="stat-info-value" id="totalProd">—</p></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div><p class="stat-info-label">Con Stock</p><p class="stat-info-value" id="conStock">—</p></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <div><p class="stat-info-label">Stock Bajo</p><p class="stat-info-value" id="stockBajo">—</p></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon red">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <div><p class="stat-info-label">Sin Stock</p><p class="stat-info-value" id="sinStock">—</p></div>
    </div>
  </div>

  <!-- FILTROS -->
  <div class="filtros-bar card card-padded" style="margin-bottom:20px">
    <div class="filtros-inner">
      <div class="filtro-group">
        <label class="filtro-label">Categoría</label>
        <select id="filtroCat" class="form-control" style="padding:9px 13px">
          <option value="">Todas las categorías</option>
        </select>
      </div>
      <div class="filtro-group">
        <label class="filtro-label">Bodega</label>
        <select id="filtroBodega" class="form-control" style="padding:9px 13px">
          <option value="">Todas las bodegas</option>
        </select>
      </div>
      <div class="filtro-group">
        <label class="filtro-label">Disponibilidad</label>
        <select id="filtroStock" class="form-control" style="padding:9px 13px">
          <option value="">Todos</option>
          <option value="ok">Con stock</option>
          <option value="low">Stock bajo (&lt;10)</option>
          <option value="empty">Sin stock</option>
        </select>
      </div>
      <div class="filtro-group" style="margin-left:auto;align-self:flex-end">
        <button id="btnVista" class="btn btn-secondary btn-sm" title="Cambiar vista">
          <svg id="iconVista" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
          Vista Cards
        </button>
        <button id="btnLimpiar" class="btn btn-ghost btn-sm" style="margin-left:6px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.77"/>
          </svg>
          Limpiar
        </button>
      </div>
    </div>
    <div id="resultadoInfo" class="resultado-info" style="display:none"></div>
  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <div id="contenidoPrincipal">
    <div class="spinner-wrap"><div class="spinner"></div><p>Cargando inventario...</p></div>
  </div>

</div>
</main>

<!-- ── MODAL DETALLE PRODUCTO ── -->
<div id="modalProducto" class="modal-overlay" aria-hidden="true">
  <div class="modal-content modal-lg">
    <div class="modal-header">
      <div>
        <h2 id="modalProdNombre">Producto</h2>
        <p id="modalProdSku" style="margin:4px 0 0;font-size:13px;color:var(--text-muted)"></p>
      </div>
      <button class="modal-close" id="modalProdClose">×</button>
    </div>
    <div class="modal-body" id="modalProdBody">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="btnCerrarProd">Cerrar</button>
    </div>
  </div>
</div>

<script src="../controllers/header-footer.js"></script>
<script src="../controllers/permisos.js"></script>
<script src="../controllers/tendero.js"></script>
</body>
</html>
