; ================================================================
;  ProStockTool — php.ini (producción)
;  En hosting compartido usar como: .user.ini  en la raíz del proyecto
;  En VPS/servidor propio:          php.ini  o  conf.d/prostocktool.ini
;
;  Después de cualquier cambio, reiniciar PHP:
;    sudo systemctl restart php8.2-fpm   (PHP-FPM)
;    sudo systemctl restart apache2      (mod_php)
; ================================================================

; ── Errores: silenciar en producción, redirigir al log ───────────
display_errors         = Off
display_startup_errors = Off
log_errors             = On
error_reporting        = E_ALL & ~E_NOTICE & ~E_DEPRECATED & ~E_STRICT

; Ruta del log de PHP (ajustar según el servidor)
; error_log = /var/log/php/prostocktool_errors.log

; ── Zona horaria ─────────────────────────────────────────────────
date.timezone = America/Bogota

; ── Sesiones ─────────────────────────────────────────────────────
; Nombre de la cookie (debe coincidir con SESSION_NAME en .env)
session.name            = PST_SESSION
session.gc_maxlifetime  = 86400
session.cookie_httponly = 1
session.cookie_samesite = Lax
; Activar solo si el sitio usa HTTPS:
; session.cookie_secure = 1

; Guardar sesiones en archivos (por defecto)
session.save_handler = files
; session.save_path  = /var/lib/php/sessions/prostocktool

; ── Uploads ──────────────────────────────────────────────────────
file_uploads      = On
upload_max_filesize = 2M
post_max_size     = 8M

; ── Rendimiento y límites ────────────────────────────────────────
max_execution_time   = 60
max_input_time       = 60
memory_limit         = 128M
max_input_vars       = 2000

; ── Seguridad general ────────────────────────────────────────────
; Ocultar versión de PHP en cabeceras HTTP
expose_php = Off

; Deshabilitar funciones peligrosas en producción
; disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source

; ── Charset por defecto ──────────────────────────────────────────
default_charset = UTF-8

; ── MySQLi ───────────────────────────────────────────────────────
mysqli.default_charset = utf8mb4

; ── PDO ──────────────────────────────────────────────────────────
; pdo_mysql.default_socket =
