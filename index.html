<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProStockTool — Cargando...</title>
    <link rel="icon" href="public/icon/logo2.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 50%, #1e3a8a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            z-index: 10;
        }

        .loading-spinner {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .loading-spinner::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: spin 3s linear infinite;
        }

        .loading-spinner::after {
            content: '';
            position: absolute;
            inset: 8px;
            border: 4px solid transparent;
            border-top-color: #3b82f6;
            border-right-color: #60a5fa;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: white;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1px;
            text-align: center;
            animation: pulse-text 1.5s ease-in-out infinite;
        }

        @keyframes pulse-text {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .loading-dots {
            display: inline-block;
            margin-left: 4px;
            animation: dots 1.5s ease-in-out infinite;
        }

        @keyframes dots {
            0% {
                content: '';
            }
            33% {
                content: '.';
            }
            66% {
                content: '..';
            }
            100% {
                content: '...';
            }
        }

        .logo-container {
            margin-bottom: 16px;
        }

        .logo-text {
            color: white;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        /* Elementos decorativos */
        .decoration {
            position: fixed;
            pointer-events: none;
        }

        .decoration--1 {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 65%);
            top: -50px;
            right: -50px;
            animation: float-a 6s ease-in-out infinite;
        }

        .decoration--2 {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 65%);
            bottom: -30px;
            left: -30px;
            animation: float-b 8s ease-in-out infinite;
        }

        @keyframes float-a {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes float-b {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(20px);
            }
        }

        .progress-bar {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 16px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
            background-size: 200% 100%;
            border-radius: 2px;
            animation: progress 2s ease-in-out infinite;
        }

        @keyframes progress {
            0% {
                width: 0%;
                background-position: 0% 0%;
            }
            50% {
                width: 100%;
                background-position: 100% 0%;
            }
            100% {
                width: 0%;
                background-position: 0% 0%;
            }
        }
    </style>
</head>
<body>
    <div class="decoration decoration--1"></div>
    <div class="decoration decoration--2"></div>

    <div class="loading-container">
        <div class="logo-container">
            <div class="logo-text">ProStockTool</div>
        </div>
        
        <div class="loading-spinner"></div>
        
        <div class="loading-text">
            Cargando<span class="loading-dots"></span>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <script>
        // Esperar a que todos los recursos estén completamente cargados
        window.addEventListener('load', function() {
            // Pequeño delay para que se vea bien la animación
            setTimeout(function() {
                window.location.href = 'public/index.html';
            }, 800);
        });

        // Fallback por si acaso: redirigir después de 10 segundos máximo
        setTimeout(function() {
            if (document.readyState !== 'complete') {
                window.location.href = 'public/index.html';
            }
        }, 10000);
    </script>
</body>
</html>
